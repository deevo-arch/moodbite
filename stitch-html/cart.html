<body class="text-on-surface overflow-hidden">

<span class="font-bold text-sm">1</span>

<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>

<p class="text-sm text-on-surface/60 mb-3">Velvet Patisserie • warm lava center</p>
<div class="flex justify-between items-center">
<div class="flex items-center bg-surface-container-high rounded-full px-3 py-1 gap-4">
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined text-sm" data-icon="remove">remove</span></button>
<span class="font-bold text-sm">1</span>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined text-sm" data-icon="add">add</span></button>

<span class="font-bold text-primary">$14.00</span>
</div>
</div>

<div class="pt-4 border-t border-white/5 flex justify-between items-center mb-6">

<button class="w-full py-5 bg-gradient-to-r from-[#FFB77D] to-[#FF8C00] text-on-primary-container font-black text-lg rounded-full shadow-[0_20px_40px_rgba(255,140,0,0.2)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
