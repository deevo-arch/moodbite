<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MoodBite | Premium Login</title>

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.glass-panel {
    background: rgba(19, 19, 19, 0.4);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px)
    }
.bg-immersive {
    background-image: linear-gradient(rgba(19, 19, 19, 0.6), rgba(19, 19, 19, 0.9)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuA5jSr7YeUy4AXDgBUTuMzjhVw-un5mokY-Ca8Zd5hrHk595oTcjBRFCGrlYwVZi_sn17sRC9rhTxGElO9qIQ7K5DZoUNQzyc1n0I3dxEly3onOqWP9fAc-rhoRcJlCuMVwPXKrLuPYsRmwynD9k3XqW1b-dZD8ZGEWYQgCsQsvdIHgu7QY_Yh3OQpw7uCBCXf4BGXMytUN4_HjOts-ara9AcTlHyaHUUCYT9_-rIzr42z9HS36RYtRqnyVrcQnvJXLq_3-qfpLFm9x);
    background-size: cover;
    background-position: center

<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary">
<!-- Immersive Background Wrapper -->
<div class="fixed inset-0 z-0 bg-immersive overflow-hidden" data-alt="high-end dimly lit restaurant interior with deep shadows, elegant table settings, and soft warm amber spotlighting on gourmet dishes">
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-background/20 to-background"></div>
</div>
<!-- Main Navigation (Hidden on Transactional Pages per Conflict Resolution Protocol) -->
<!-- The BottomNavBar and TopAppBar are suppressed for this Login screen to prioritize the focused journey -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center p-6 md:p-12">
<!-- Login Card Container -->
<div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-8 duration-1000">
<div class="glass-panel rounded-xl p-8 md:p-12 border border-white/5 shadow-2xl space-y-10">
<!-- Brand Identity -->
<div class="text-center space-y-3">
<h1 class="text-5xl font-black tracking-tighter bg-gradient-to-r from-[#FFB77D] to-[#FF8C00] bg-clip-text text-transparent">
                        MoodBite
                    </h1>
<p class="text-on-surface-variant font-medium tracking-tight text-sm opacity-80">
                        Feed your mood. Not just your hunger.
                    </p>
</div>
<!-- Input Section -->
<form class="space-y-6">
<div class="space-y-4">
<!-- Email Field -->
<div class="relative group">
<div class="absolute inset-y-0 left-6 flex items-center pointer-events-none text-on-surface-variant/60 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">mail</span>
</div>
<input class="w-full bg-surface-container-highest/30 border-0 rounded-full py-4 pl-14 pr-6 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/30 transition-all duration-300 backdrop-blur-md" placeholder="Email address" type="email"/>
</div>
<!-- Password Field -->
<div class="relative group">
<div class="absolute inset-y-0 left-6 flex items-center pointer-events-none text-on-surface-variant/60 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">lock</span>
</div>
<input class="w-full bg-surface-container-highest/30 border-0 rounded-full py-4 pl-14 pr-6 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/30 transition-all duration-300 backdrop-blur-md" placeholder="Password" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between px-2">
<label class="flex items-center space-x-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded-md border-0 bg-surface-container-highest/50 text-primary focus:ring-0 focus:ring-offset-0 transition-all" type="checkbox"/>
<span class="absolute material-symbols-outlined opacity-0 peer-checked:opacity-100 text-on-primary-container text-xs transition-opacity pointer-events-none" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="text-xs font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="text-xs font-semibold text-secondary-fixed-dim hover:text-secondary transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-bold rounded-full shadow-lg shadow-primary-container/20 active:scale-95 transition-all duration-200 hover:opacity-90" type="submit">
                        Sign In
                    </button>
</form>
<!-- Footer Links -->
<div class="pt-4 border-t border-white/5 text-center">
<p class="text-on-surface-variant text-sm">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Social Login / Auxiliary Section -->
<div class="mt-8 flex flex-col items-center space-y-6">
<div class="flex items-center w-full space-x-4">
<div class="h-[1px] flex-grow bg-white/10"></div>
<span class="text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/50 font-bold">Or continue with</span>
<div class="h-[1px] flex-grow bg-white/10"></div>
</div>
<div class="flex space-x-4">
<button class="w-14 h-14 rounded-full glass-panel border border-white/5 flex items-center justify-center text-on-surface hover:bg-white/10 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">brand_awareness</span>
</button>
<button class="w-14 h-14 rounded-full glass-panel border border-white/5 flex items-center justify-center text-on-surface hover:bg-white/10 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">alternate_email</span>
</button>
<button class="w-14 h-14 rounded-full glass-panel border border-white/5 flex items-center justify-center text-on-surface hover:bg-white/10 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">ios</span>
</button>
</div>
</div>
</div>
<!-- Footer Legal (Micro) -->
<footer class="mt-auto pt-12 text-[10px] text-on-surface-variant/30 uppercase tracking-widest text-center">
            © 2024 MoodBite Culinary Systems • Privacy • Terms
        </footer>
</main>
<!-- Contextual FAB Suppression (Per Rule: No FAB on Login/Transactional Screens) -->
</body></html>
